<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VitalNexus | Portfolio</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; line-height: 1.6; max-width: 800px; margin: 40px auto; padding: 0 20px; color: #adbac7; background-color: #22272e; }
        .bio { border-bottom: 1px solid #444c56; padding-bottom: 2rem; margin-bottom: 2rem; }
        h1 { color: #539bf5; margin-bottom: 0.5rem; }
        .repo-card { border: 1px solid #444c56; padding: 1.2rem; margin-bottom: 1rem; border-radius: 6px; background-color: #2d333b; border-left: 4px solid #539bf5; }
        .repo-name { font-weight: 600; color: #539bf5; text-decoration: none; font-size: 1.1rem; }
        .repo-desc { color: #768390; margin: 0.5rem 0; font-size: 0.95rem; }
        .date { font-size: 0.8rem; color: #545d68; }
    </style>
</head>
<body>

    <section class="bio">
        <h1>VitalNexus</h1>
        <p>IT Operations & Systems Professional. Specializing in technical infrastructure, automated workflows, and system optimization. This dashboard tracks my latest repository activity and technical projects.</p>
    </section>

    <h2>Recent Activity</h2>
    <div id="repo-list">Loading activity from GitHub...</div>

    <script>
        async function fetchRepos() {
            const username = 'vitalnexus';
            try {
                const response = await fetch(`https://api.github.com/users/${username}/repos?sort=updated&per_page=6`);
                const repos = await response.json();
                const container = document.getElementById('repo-list');
                container.innerHTML = '';

                repos.forEach(repo => {
                    if(repo.name !== 'vitalnexus.github.io') { // Hide this repo from the list
                        const card = document.createElement('div');
                        card.className = 'repo-card';
                        card.innerHTML = `
                            <a class="repo-name" href="${repo.html_url}" target="_blank">${repo.name}</a>
                            <p class="repo-desc">${repo.description || 'System project / Repository'}</p>
                            <span class="date">Last update: ${new Date(repo.updated_at).toLocaleDateString()}</span>
                        `;
                        container.appendChild(card);
                    }
                });
            } catch (e) {
                document.getElementById('repo-list').innerHTML = "Unable to sync with GitHub API.";
            }
        }
        fetchRepos();
    </script>
</body>
</html>
